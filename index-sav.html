<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning SAV — Ascenseurs Menétrey SA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" href="https://menetrey-lift.ch/wp-content/uploads/2022/05/logo-menetrey-mobile.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#16161a;--bg-elev-1:#1d1d22;--bg-elev-2:#23232a;--bg-elev-3:#2a2a32;
  --border:#33333a;--border-strong:#33333a;
  --text:#ededee;--text-muted:#a1a1a8;--text-faint:#6e6e76;
  --primary:#1B3A6B;--primary-hover:#2c5494;--primary-soft:rgba(27,58,107,.18);
  /* Couleurs étiquettes SAV */
  --sav-cyan:#00BCD4;--sav-orange:#FF9800;--sav-jaune:#FDD835;
  --sav-marron:#5D4037;--sav-orangec:#FFB74D;--sav-gris:#90A4AE;
  --sav-noir:#212121;--sav-rose:#F48FB1;--sav-vert:#43A047;
  /* Couleurs étiquettes montage (pour lignes communes) */
  --rouge:#dc4c4c;--bleu:#3b6cc4;--violet:#9d4cb6;
  --gris-lbl:#7e8893;--jaune:#d4b73a;--vert:#33c777;
  --orange:#e8901a;--rose:#d8568a;--noir-lbl:#3a3a3e;--brun:#8d6e63;
  --col-w:32px;--row-h:48px;
}
body{font-family:'Inter',sans-serif;font-size:13px;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--bg-elev-1);padding:0 16px;display:flex;align-items:center;height:52px;flex-shrink:0;gap:12px;border-bottom:1px solid var(--border);position:relative}
header::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:1px;background:linear-gradient(90deg,transparent,rgba(27,58,107,.4),transparent)}
header img.brand-logo{height:30px;filter:brightness(0) invert(1) opacity(.95);transition:.2s}
header img.brand-logo:hover{filter:none}
header h1{font-size:14px;font-weight:600;white-space:nowrap;letter-spacing:-.01em}
header .spacer{flex:1}
header .file-status{font-size:11px;color:var(--text-muted);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid transparent;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;transition:.15s}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-hover)}
.btn-secondary{background:var(--bg-elev-2);color:var(--text);border-color:var(--border)}
.btn-secondary:hover{background:var(--bg-elev-3)}
.btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg-elev-2);color:var(--text)}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-danger{background:#3a1e1e;color:#f87171;border-color:#5a2929}
.btn-danger:hover{background:#4a2424;color:#fca5a5}
.btn-link{background:rgba(27,58,107,.15);color:#93c5fd;border:1px solid rgba(27,58,107,.4);font-weight:500}
.btn-link:hover{background:rgba(27,58,107,.25);color:#bfdbfe}
.gantt-toolbar{background:var(--bg-elev-1);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.view-btn{padding:4px 12px;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-size:11.5px;background:var(--bg-elev-2);color:var(--text-muted);font-weight:500;transition:.15s;font-family:inherit}
.view-btn:hover{background:var(--bg-elev-3);color:var(--text)}
.view-btn.active{background:var(--primary-soft);color:#93c5fd;border-color:var(--primary)}
.nav-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--bg-elev-2);color:var(--text-muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.nav-btn:hover{background:var(--bg-elev-3);color:var(--text)}
#period-label{font-size:12px;font-weight:500;color:var(--text-muted);min-width:160px}
.gantt-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column}
.gantt-scroll{flex:1;overflow:auto}
.gr-header{position:sticky;top:0;z-index:25;display:flex;background:var(--bg-elev-1)!important;border-bottom:1px solid var(--border)}
.gr-corner{position:sticky;left:0;z-index:30;width:200px;min-width:200px;flex-shrink:0;background:var(--bg-elev-1);border-right:1px solid var(--border);display:flex;align-items:center;padding:0 12px;font-weight:600;font-size:10.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.08em;height:76px}
.gr-header-right{display:flex;flex-direction:column;flex-shrink:0}
.gr-month-row{display:flex;height:22px;background:var(--bg-elev-2);border-bottom:1px solid var(--border)}
.gr-week-row{display:flex;height:16px;background:var(--bg-elev-1);border-bottom:1px solid var(--border)}
.week-band{display:flex;align-items:center;font-size:9.5px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em;border-right:1px solid var(--border);background:var(--bg-elev-1);white-space:nowrap}
.week-band-inner{position:sticky;left:208px;padding:0 6px}
.gr-day-row{display:flex;height:38px}
.month-band{display:flex;align-items:center;font-size:10.5px;font-weight:600;color:#93c5fd;text-transform:uppercase;letter-spacing:.08em;border-right:1px solid var(--border);background:var(--bg-elev-2);white-space:nowrap}
.month-band-inner{position:sticky;left:208px;padding:0 8px}
.day-header{min-width:var(--col-w);width:var(--col-w);height:38px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;border-right:1px solid var(--border);user-select:none;background:var(--bg-elev-1);color:var(--text-muted)}
.day-header .day-num{font-weight:600;font-size:13px;color:var(--text)}
.day-header .day-name{font-size:9px;text-transform:uppercase;color:var(--text-faint);letter-spacing:.05em}
.day-header.weekend{background:#0d0d0f}
.day-header.weekend .day-num,.day-header.weekend .day-name{color:var(--text-faint)}
.day-header.ferie{background:#3d3318;color:#fde68a}
.day-header.ferie .day-num{color:#fde68a;font-weight:700}
.day-header.today{background:#1f3a78;color:#fff}
.day-header.today .day-num{color:#fff;font-weight:800}
.day-header.marker-14{background:rgba(96,165,250,.18);color:#bfdbfe}
.day-header.marker-35{background:rgba(147,197,253,.15);color:#dbeafe}
.gr-block-header{display:flex;background:var(--bg-elev-2);border-bottom:1px solid var(--border);border-top:1px solid var(--border);height:34px;align-items:center;min-width:max-content}
.gr-block-name{position:sticky;left:0;z-index:20;width:200px;min-width:200px;flex-shrink:0;background:var(--bg-elev-2);border-right:1px solid var(--border);padding:0 12px;font-size:11px;font-weight:700;text-transform:uppercase;color:#93c5fd;letter-spacing:.08em;display:flex;align-items:center;gap:6px;height:34px}
.gr-block-fill{flex:1;background:var(--bg-elev-2)}
.gr-row{display:flex;border-bottom:1px solid var(--border);height:var(--row-h);background:#15151a;min-width:max-content}
.gr-row:hover{background:#1a1a20}
.gr-row.commune{background:#16202b}
.gr-row.commune:hover{background:#1a2535}
.gr-row.monteur-zone{background:#2a1212}
.gr-row.monteur-zone:hover{background:#341818}
.gr-name{position:sticky;left:0;z-index:10;width:200px;min-width:200px;flex-shrink:0;background:inherit;border-right:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px}
.gr-name .group-badge{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;background:var(--bg-elev-3);color:var(--text-muted);border:1px solid var(--border);letter-spacing:.03em;flex-shrink:0}
.gr-name .group-badge.sav-bloque{background:rgba(220,38,38,.2);color:#fca5a5;border-color:rgba(220,38,38,.4)}
.gr-name .person-info{overflow:hidden;flex:1;min-width:0}
.gr-name .person-name{font-weight:500;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.gr-name .person-role{font-size:10.5px;color:var(--text-faint);margin-top:1px}
.gr-days{display:flex;position:relative;flex-shrink:0}
.day-cell{min-width:var(--col-w);width:var(--col-w);height:var(--row-h);border-right:1px solid var(--border);cursor:pointer;position:relative;background:#15151a}
.gr-row:hover .day-cell{background:#1a1a20}
.gr-row.commune .day-cell{background:#16202b}
.gr-row.commune:hover .day-cell{background:#1a2535}
.gr-row.monteur-zone .day-cell{background:#2a1212}
.gr-row.monteur-zone:hover .day-cell{background:#341818}
.day-cell:hover,.gr-row:hover .day-cell:hover{background:#22222a}
.day-cell.weekend{background:#08080a!important}
.day-cell.ferie{background:rgba(212,183,58,.16);box-shadow:inset 1px 0 0 rgba(212,183,58,.5),inset -1px 0 0 rgba(212,183,58,.5)}
.day-cell.today{background:rgba(59,108,196,.32);box-shadow:inset 3px 0 0 #60a5fa,inset -3px 0 0 #60a5fa,0 0 12px rgba(96,165,250,.25)}
.day-cell.marker-14{background:rgba(96,165,250,.13);box-shadow:inset 1px 0 0 #60a5fa,inset -1px 0 0 #60a5fa}
.day-cell.marker-35{background:rgba(147,197,253,.12);box-shadow:inset 1px 0 0 #93c5fd,inset -1px 0 0 #93c5fd}
.noir-watermark{position:absolute;top:0;height:100%;background:repeating-linear-gradient(45deg,rgba(220,38,38,.08) 0,rgba(220,38,38,.08) 8px,rgba(220,38,38,.18) 8px,rgba(220,38,38,.18) 16px);box-shadow:inset 0 0 0 1px rgba(220,38,38,.4);display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:1;overflow:hidden}
.noir-watermark span{font-size:13px;font-weight:700;color:rgba(252,165,165,.4);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
.label-block{position:absolute;top:4px;height:calc(var(--row-h) - 8px);border-radius:6px;display:flex;align-items:center;padding:0 9px;font-size:11px;font-weight:500;cursor:grab;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;z-index:5;border:1px solid rgba(255,255,255,.06);transition:.15s;user-select:none;box-shadow:0 1px 0 rgba(0,0,0,.4);touch-action:pan-x pan-y;letter-spacing:-.005em}
.label-block.dragging{cursor:grabbing;opacity:.85;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.6);transform:scale(1.02)}
.label-block:hover{filter:brightness(1.15);box-shadow:0 2px 8px rgba(0,0,0,.5)}
.label-block.dark-text{color:#1a1a1c}
.label-block.light-text{color:#fff}
.label-block.vert-indic{height:14px;top:auto;bottom:3px;font-size:10px;padding:0 6px;border-radius:4px;font-weight:600}
/* Étiquettes empilées (chevauchement) */
.label-block.stack-top{top:4px;height:calc((var(--row-h) - 8px) / 2 - 1px)}
.label-block.stack-bot{top:calc(var(--row-h) / 2 + 2px);height:calc((var(--row-h) - 8px) / 2 - 1px)}
/* Mode flottant (drag tactile) */
.label-block.floating{cursor:grabbing;opacity:.92;z-index:60;transform:scale(1.06);box-shadow:0 12px 32px rgba(0,0,0,.7),0 0 0 2px var(--primary),0 0 18px rgba(96,165,250,.6);touch-action:none}
.label-block.long-pressing{transform:scale(.97);box-shadow:0 0 0 2px var(--primary),0 0 12px rgba(96,165,250,.5);transition:transform .15s,box-shadow .15s}
/* Mode compact — masque toolbar/légende, réduit le header et les colonnes noms */
body.compact .gantt-toolbar,
body.compact .legend-sav{display:none!important}
body.compact header{min-height:38px;height:auto;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden}
body.compact header h1{font-size:14px;line-height:1}
body.compact header > div:first-child > div:first-child{display:none}
body.compact .gr-corner,
body.compact .gr-name,
body.compact .gr-block-name{width:110px;min-width:110px;padding:0 4px}
body.compact .gr-name .person-name{font-size:10px;white-space:normal;line-height:1.1;font-weight:600}
body.compact .gr-name .person-role{font-size:9px}
body.compact .gr-name .group-badge{display:none}
#compact-chev{transition:transform .2s}
body.compact #compact-chev{transform:rotate(-90deg);display:inline-block}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bg-elev-2);border:1px solid var(--border-strong);border-radius:12px;max-width:540px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.6);color:var(--text)}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.modal-header h2{font-size:15px;font-weight:600;flex:1;letter-spacing:-.01em}
.modal-header .type-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.modal-body{padding:20px 22px}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--bg-elev-1)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11.5px;font-weight:500;color:var(--text-muted);margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;background:var(--bg-elev-1);color:var(--text)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft);background:var(--bg-elev-2)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-error{color:#f87171;font-size:12px;margin-top:4px;font-weight:500;min-height:16px}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:4px 0}
.type-option{border:2px solid transparent;border-radius:8px;padding:10px;cursor:pointer;text-align:center;background:var(--bg-elev-1)}
.type-option:hover{border-color:currentColor;background:var(--bg-elev-3)}
.type-option .type-swatch{width:28px;height:28px;border-radius:6px;margin:0 auto 6px}
.type-option .type-name{font-size:12px;font-weight:600;color:var(--text)}
.detail-popup{position:fixed;z-index:500;background:var(--bg-elev-2);border:1px solid var(--border-strong);border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.7);min-width:300px;max-width:380px;overflow:hidden;color:var(--text)}
.detail-popup .popup-header{padding:14px 16px;color:#fff;font-weight:600;font-size:13px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.1)}
.detail-popup .popup-body{padding:14px 16px}
.detail-popup .popup-row{display:flex;gap:6px;margin-bottom:7px;font-size:12px}
.detail-popup .popup-row .pkey{color:var(--text-faint);min-width:120px;flex-shrink:0;font-weight:500}
.detail-popup .popup-row .pval{font-weight:400;word-break:break-word}
.detail-popup .popup-actions{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:6px;justify-content:flex-end;background:var(--bg-elev-1)}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{padding:11px 16px;border-radius:8px;color:#fff;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.5);max-width:340px;border:1px solid rgba(255,255,255,.08);animation:slideIn .2s ease}
.toast.success{background:rgba(22,163,74,.95)}
.toast.error{background:rgba(220,38,38,.95)}
.toast.warning{background:rgba(217,119,6,.95)}
.toast.info{background:rgba(27,58,107,.95)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}
.legend-sav{display:flex;flex-wrap:wrap;gap:8px;padding:6px 12px;background:var(--bg-elev-1);border-bottom:1px solid var(--border);flex-shrink:0;font-size:11px;color:var(--text-muted)}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-dot{width:10px;height:10px;border-radius:3px;border:1px solid rgba(255,255,255,.08)}
#auth-screen{position:fixed;inset:0;background:radial-gradient(ellipse at top,#0f1c33 0%,var(--bg) 60%);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:3000;color:var(--text);gap:18px;padding:24px}
#auth-screen.visible{display:flex}
#auth-screen img.fs-logo{max-width:260px;filter:brightness(0) invert(1) opacity(.95)}
#auth-screen h2{font-size:22px;font-weight:600;letter-spacing:-.02em}
#auth-screen p{color:var(--text-muted);text-align:center;max-width:420px;font-size:13px}
#auth-screen .auth-form{display:flex;flex-direction:column;gap:10px;width:100%;max-width:340px;margin-top:6px}
#auth-screen .auth-form input{padding:11px 13px;border:1px solid var(--border);border-radius:8px;background:var(--bg-elev-2);color:var(--text);font-size:14px;font-family:inherit}
#auth-screen .auth-form input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.btn-white{background:var(--primary);color:#fff;font-weight:500;padding:11px 22px;border-radius:8px;border:1px solid var(--primary);cursor:pointer;font-size:14px;font-family:inherit}
.btn-white:hover{background:var(--primary-hover)}
.btn-white:disabled{opacity:.6;cursor:wait}
#sync-indicator{font-size:11px;color:var(--text-faint)}
#sync-indicator::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:#10b981;box-shadow:0 0 6px rgba(16,185,129,.5);margin-right:4px;vertical-align:middle}
#sync-indicator.syncing::before{background:#fbbf24;animation:pulse 1s infinite}
#sync-indicator.error::before{background:#ef4444}
@keyframes pulse{50%{opacity:.4}}
.role-badge{display:inline-block;padding:1px 6px;border-radius:10px;font-size:9px;font-weight:600;text-transform:uppercase;margin-left:6px;border:1px solid var(--border)}
.role-admin{background:rgba(220,76,76,.15);color:#fca5a5;border-color:rgba(220,76,76,.3)}
.role-editor{background:rgba(59,108,196,.15);color:#93c5fd;border-color:rgba(59,108,196,.3)}
.role-viewer{background:var(--bg-elev-3);color:var(--text-muted)}
body.role-readonly .editor-only,
body.role-readonly .admin-only,
body:not(.role-admin) .admin-only{display:none!important}
body.role-readonly .label-block{cursor:default}
body.role-readonly .day-cell{cursor:default}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px;border:2px solid var(--bg)}
.empty-monteur-zone{padding:14px 12px;color:var(--text-faint);font-style:italic;font-size:12px;text-align:center;border-bottom:1px solid var(--border)}
.travaux-sav-list{margin-top:8px;border-top:1px solid var(--border);padding-top:8px}
.travaux-sav-list .ts-item{font-size:11px;padding:4px 0;color:var(--text-muted);border-bottom:1px dotted var(--border)}
.travaux-sav-list .ts-item:last-child{border-bottom:none}
.travaux-sav-list .ts-type{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:6px;vertical-align:middle}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <img class="fs-logo" src="https://menetrey-lift.ch/wp-content/uploads/2022/05/logotest-web.png" alt="Menétrey">
  <h2>Planning SAV</h2>
  <p>Connectez-vous pour accéder au planning SAV partagé.</p>
  <form class="auth-form" onsubmit="event.preventDefault(); doLogin();">
    <input type="email" id="login-email" placeholder="Email" required autocomplete="username">
    <input type="password" id="login-password" placeholder="Mot de passe" required autocomplete="current-password">
    <button type="submit" class="btn-white" id="login-btn">Se connecter</button>
    <div id="login-error" class="form-error"></div>
  </form>
</div>

<!-- HEADER -->
<header>
  <div id="header-title-block" onclick="toggleCompact()" style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:10px" title="Cliquer pour masquer/afficher les options">
    <img class="brand-logo" src="https://menetrey-lift.ch/wp-content/uploads/2022/05/logotest-web.png" alt="Menétrey">

function dateStr(d) {
  if (typeof d === 'string') return d;
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function parseDate(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function addDays(d, n) { const dt=new Date(d); dt.setDate(dt.getDate()+n); return dt; }
function isWeekend(d) { const day=(typeof d==='string'?parseDate(d):d).getDay(); return day===0||day===6; }
function isFerie(d) {
  const s = typeof d==='string'?d:dateStr(d);
  if (JOURS_FERIES.has(s)) return true;
  return (state.ponts||[]).some(p => p.date === s);
}
function isToday(d) { return (typeof d==='string'?d:dateStr(d)) === dateStr(new Date()); }
function isTodayPlus(d, n) {
  const target = dateStr(addDays(new Date(), n));
  return (typeof d==='string'?d:dateStr(d)) === target;
}
function isBusinessDay(d) { return !isWeekend(d) && !isFerie(d); }
function businessDaysBetween(a, b) {
  const start=parseDate(dateStr(a)), end=parseDate(dateStr(b));
  if (end<start) return 0;
  let count=0, d=new Date(start);
  while (d <= end) { if (isBusinessDay(d)) count++; d=addDays(d,1); }
  return count;
}
function addBusinessDays(startDate, nbBusinessDays) {
  let d=parseDate(dateStr(startDate));
  while (!isBusinessDay(d)) d=addDays(d,1);
  let remaining=Math.max(1,nbBusinessDays)-1;
  while (remaining>0) { d=addDays(d,1); if (isBusinessDay(d)) remaining--; }
  return d;
}
function formatDate(s) { return parseDate(s).toLocaleDateString('fr-CH',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function getDateRange() {
  const anchor = state.anchorDate;
  const dow = anchor.getDay()===0?6:anchor.getDay()-1;
  const baseStart = addDays(anchor, -dow);
  const start = addDays(baseStart, -state.rangeBefore);
  const total = state.rangeBefore + state.rangeAfter;
  const dates = [];
  for (let i=0;i<total;i++) dates.push(addDays(start,i));
  return dates;
}
function getColWidth() {
  return {semaine:80, mois:40, trimestre:24, annee:16}[state.view] || 24;
}
function periodLabel(dates) {
  if (!dates.length) return '';
  const monthNames = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const s = dates[0], e = dates[dates.length-1];
  return `${monthNames[s.getMonth()]} ${s.getFullYear()} – ${monthNames[e.getMonth()]} ${e.getFullYear()}`;
}
function uid() { return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2)+Math.random().toString(36).slice(2); }
function getWeekNum(d) {
  const dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = dt.getUTCDay() || 7;
  dt.setUTCDate(dt.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(dt.getUTCFullYear(), 0, 1));
  return Math.ceil((((dt - yearStart) / 86400000) + 1) / 7);
}
function getMonday(d) {
  const dow = d.getDay() === 0 ? 6 : d.getDay() - 1;
  return addDays(d, -dow);
}

let _syncTimer = null;
async function saveToFile() {
  if (!sb || !state.session) return;
  if (!canEdit()) { toast('Lecture seule', 'warning'); return; }
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(() => syncToSupabase().catch(e => setSyncError(e.message)), 200);
}
async function syncToSupabase() {
  if (!sb || !state.session || !canEdit()) return;
  setSyncing(true);
  state._suppressRealtime = true;
  try {
    // Pour chaque table : upsert tout l'état + delete les IDs absents
    const tables = {
      personnes_sav: state.personnes_sav,
      etiquettes_sav: state.etiquettes_sav,
      // Pour les tables montage, on ne pousse que ce qui a été modifié ici
      // (étiquettes des lignes communes + mises à jour de data.travaux_sav)
      etiquettes: state.etiquettes_montage,
    };
    for (const [t, items] of Object.entries(tables)) {
      if (items.length > 0) {
        const rows = items.map(x => ({ id: String(x.id), body: x }));
        const { error } = await sb.from(t).upsert(rows);
        if (error) throw new Error(`${t} upsert: ${error.message}`);
      }
      // Delete : seulement pour les tables SAV (pas etiquettes montage)
      if (t === 'etiquettes') continue;
      const { data: existing, error: selErr } = await sb.from(t).select('id');
      if (selErr) throw new Error(`${t} select: ${selErr.message}`);
      const stateIds = new Set(items.map(x => String(x.id)));
      const toDelete = (existing||[]).filter(r => !stateIds.has(String(r.id))).map(r => r.id);
      if (toDelete.length) {
        const { error: delErr } = await sb.from(t).delete().in('id', toDelete);
        if (delErr) throw new Error(`${t} delete: ${delErr.message}`);
      }
    }
    setSyncing(false);
  } catch (e) {
    setSyncError(e.message);
    toast('Erreur sync : '+e.message, 'error');
  } finally {
    setTimeout(() => { state._suppressRealtime = false; }, 600);
  }
}

function setSyncing(on) {
  const el = document.getElementById('sync-indicator');
  if (!el) return;
  if (on) { el.classList.add('syncing'); el.classList.remove('error'); el.textContent='Synchro…'; }
  else { el.classList.remove('syncing'); el.textContent='Synchronisé'; }
}
function setSyncError(msg) {
  const el = document.getElementById('sync-indicator');
  if (el) { el.classList.add('error'); el.classList.remove('syncing'); el.textContent='Erreur sync'; el.title = msg||''; }
}

let _channels = [];
let _reloadTimer = null;
function subscribeRealtime() {
  unsubscribeRealtime();
  const debouncedReload = () => {
    if (state._suppressRealtime) return;
    clearTimeout(_reloadTimer);
    _reloadTimer = setTimeout(async () => {
      try { await loadStateFromSupabase(); renderAll(); }
      catch (e) { console.warn(e); }
    }, 250);
  };
  ['etiquettes_sav','personnes_sav','etiquettes','personnes','ponts'].forEach(t => {
    const ch = sb.channel('rt-sav-'+t)
      .on('postgres_changes', {event:'*', schema:'public', table:t}, debouncedReload)
      .subscribe();
    _channels.push(ch);
  });
}
function unsubscribeRealtime() {
  _channels.forEach(ch => { try { sb.removeChannel(ch); } catch(e){} });
  _channels = [];
}

function getMonteursEnSav(rangeStart, rangeEnd) {
  const noirs = state.etiquettes_montage.filter(e =>
    e.type === 'noir' && e.dateDebut <= rangeEnd && e.dateFin >= rangeStart
  );
  // Grouper par monteur (peut avoir plusieurs noirs)
  const map = new Map();
  noirs.forEach(n => {
    const m = state.personnes_montage.find(p => String(p.id) === String(n.personneId));
    if (!m) return;
    if (!map.has(m.id)) map.set(m.id, { person:m, noirs:[] });
    map.get(m.id).noirs.push(n);
  });
  return [...map.values()];
}

function renderGantt() {
  const dates = getDateRange();
  const colW = getColWidth();
  document.documentElement.style.setProperty('--col-w', colW+'px');
  document.getElementById('period-label').textContent = periodLabel(dates);

  const dateMap = {};
  dates.forEach((d,i) => { dateMap[dateStr(d)] = i; });
  const rangeStart = dateStr(dates[0]);
  const rangeEnd   = dateStr(dates[dates.length-1]);

  const scroll = document.getElementById('gantt-scroll');
  scroll.innerHTML = '';

  // ── HEADER ──
  const headerRow = document.createElement('div');
  headerRow.className = 'gr-header';
  const corner = document.createElement('div');
  corner.className = 'gr-corner';
  corner.textContent = 'PLANNING SAV';
  headerRow.appendChild(corner);

  const totalDaysWidth = dates.length * colW;
  const headerRight = document.createElement('div');
  headerRight.className = 'gr-header-right';
  headerRight.style.width = totalDaysWidth + 'px';
  headerRight.style.minWidth = totalDaysWidth + 'px';
  const monthRow = document.createElement('div');
  monthRow.className = 'gr-month-row';
  monthRow.style.width = totalDaysWidth + 'px';
  const weekRow = document.createElement('div');
  weekRow.className = 'gr-week-row';
  weekRow.style.width = totalDaysWidth + 'px';
  const dayRow = document.createElement('div');
  dayRow.className = 'gr-day-row';
  dayRow.style.width = totalDaysWidth + 'px';

  const monthNames = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const dayNames = ['Di','Lu','Ma','Me','Je','Ve','Sa'];
  let curMonth=null, curYear=null, curCount=0;
  let curWeek=null, curWeekCount=0;
  const flushMonth = () => {
    if (curCount===0) return;
    const band = document.createElement('div');
    band.className = 'month-band';
    band.style.width = (curCount*colW)+'px';
    band.style.minWidth = (curCount*colW)+'px';
    const inner = document.createElement('div');
    inner.className = 'month-band-inner';
    inner.textContent = `${monthNames[curMonth]} ${curYear}`;
    band.appendChild(inner);
    monthRow.appendChild(band);
  };
  const flushWeek = () => {
    if (curWeekCount===0) return;
    const band = document.createElement('div');
    band.className = 'week-band';
    band.style.width = (curWeekCount*colW)+'px';
    band.style.minWidth = (curWeekCount*colW)+'px';
    const inner = document.createElement('div');
    inner.className = 'week-band-inner';
    inner.textContent = `S${curWeek}`;
    band.appendChild(inner);
    weekRow.appendChild(band);
  };
  dates.forEach(d => {
    const ds = dateStr(d);
    if (d.getMonth()!==curMonth || d.getFullYear()!==curYear) {
      flushMonth();
      curMonth=d.getMonth(); curYear=d.getFullYear(); curCount=0;
    }
    const wn = getWeekNum(d);
    if (wn !== curWeek) { flushWeek(); curWeek = wn; curWeekCount = 0; }
    curWeekCount++;
    curCount++;
    const cell = document.createElement('div');
    cell.className = 'day-header';
    if (isToday(d)) cell.classList.add('today');
    else if (isWeekend(d)) cell.classList.add('weekend');
    if (isFerie(ds)) cell.classList.add('ferie');
    if (isTodayPlus(d, 14)) cell.classList.add('marker-14');
    if (isTodayPlus(d, 35)) cell.classList.add('marker-35');
    cell.style.width = colW+'px';
    cell.innerHTML = `<div class="day-num">${d.getDate()}</div><div class="day-name">${dayNames[d.getDay()]}</div>`;
    dayRow.appendChild(cell);
  });
  flushMonth();
  flushWeek();
  headerRight.appendChild(monthRow);
  headerRight.appendChild(weekRow);
  headerRight.appendChild(dayRow);
  headerRow.appendChild(headerRight);
  scroll.appendChild(headerRow);

  // ── BLOC 1 : Lignes communes ──
  const commune = getLignesCommunes();
  appendBlockHeader(scroll, '🤝 Lignes communes', dates, colW);
  if (commune.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-monteur-zone';
    empty.textContent = 'Christophe Menétrey et Frédéric Burgy non trouvés dans la table personnes (montage).';
    scroll.appendChild(empty);
  } else {
    commune.forEach(p => appendPersonRow(scroll, p, dates, colW, dateMap, rangeStart, rangeEnd, 'commune'));
  }

  // ── BLOC 2 : Équipe SAV (groupé par chef) ──
  const allActiveSav = state.personnes_sav.filter(p => p.actif);
  const chefs = allActiveSav.filter(p => p.sousgroupe === 'chef')
    .sort((a,b) => (a.nom+a.prenom).localeCompare(b.nom+b.prenom));
  // Pour chaque chef : un sous-bloc "Équipe X" → chef + ses TS
  chefs.forEach(chef => {
    appendBlockHeader(scroll, `🛠️ Équipe ${chef.prenom} ${chef.nom}`, dates, colW);
    appendSavPersonRow(scroll, chef, dates, colW, dateMap, rangeStart, rangeEnd);
    const teamMembers = allActiveSav
      .filter(p => p.sousgroupe === 'ts' && String(p.equipe||'') === String(chef.id))
      .sort((a,b) => (a.nom+a.prenom).localeCompare(b.nom+b.prenom));
    teamMembers.forEach(ts => appendSavPersonRow(scroll, ts, dates, colW, dateMap, rangeStart, rangeEnd));
  });
  // TS sans chef assigné (orphelins)
  const orphaned = allActiveSav.filter(p => p.sousgroupe === 'ts' && !p.equipe);
  if (orphaned.length > 0) {
    appendBlockHeader(scroll, '⚠️ TS sans chef', dates, colW);
    orphaned.sort((a,b) => (a.nom+a.prenom).localeCompare(b.nom+b.prenom))
      .forEach(ts => appendSavPersonRow(scroll, ts, dates, colW, dateMap, rangeStart, rangeEnd));
  }
  // Externes
  const externes = allActiveSav.filter(p => p.sousgroupe === 'externe');
  if (externes.length > 0) {
    appendBlockHeader(scroll, '🌐 Externes', dates, colW);
    externes.sort((a,b) => (a.nom+a.prenom).localeCompare(b.nom+b.prenom))
      .forEach(ts => appendSavPersonRow(scroll, ts, dates, colW, dateMap, rangeStart, rangeEnd));
  }

  // ── BLOC 3 : Monteurs en SAV bloqué ──
  appendBlockHeader(scroll, '⚫ Monteurs (SAV bloqué)', dates, colW);
  const monteursSav = getMonteursEnSav(rangeStart, rangeEnd);
  if (monteursSav.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-monteur-zone';
    empty.textContent = 'Aucun monteur en SAV';
    scroll.appendChild(empty);
  } else {
    monteursSav.forEach(({person, noirs}) => appendMonteurZoneRow(scroll, person, noirs, dates, colW, dateMap, rangeStart, rangeEnd));
  }

  // Infinite scroll
  scroll._datesRef = dates;
  scroll._colWRef = colW;
  if (!scroll._scrollBound) {
    scroll._scrollBound = true;
    scroll.addEventListener('scroll', onGanttScroll);
  }
}

function appendBlockHeader(scroll, title, dates, colW) {
  const bh = document.createElement('div');
  bh.className = 'gr-block-header';
  const name = document.createElement('div');
  name.className = 'gr-block-name';
  name.textContent = title;
  const fill = document.createElement('div');
  fill.className = 'gr-block-fill';
  fill.style.width = (dates.length*colW)+'px';
  bh.appendChild(name); bh.appendChild(fill);
  scroll.appendChild(bh);
}

// Rendu d'une personne montage (ligne commune) — étiquettes lues dans etiquettes_montage
function appendPersonRow(scroll, person, dates, colW, dateMap, rangeStart, rangeEnd, rowClass) {
  const row = document.createElement('div');
  row.className = 'gr-row ' + (rowClass||'');
  row.dataset.personId = person.id;
  row.dataset.source = 'montage';

  const nameCell = document.createElement('div');
  nameCell.className = 'gr-name';
  const badge = document.createElement('span');
  badge.className = 'group-badge';
  badge.textContent = person.groupe || 'COM';
  const info = document.createElement('div');
  info.className = 'person-info';
  info.innerHTML = `<div class="person-name">${person.prenom} ${person.nom}</div><div class="person-role">${person.role||''}</div>`;
  nameCell.appendChild(badge); nameCell.appendChild(info);
  row.appendChild(nameCell);

  const daysArea = document.createElement('div');
  daysArea.className = 'gr-days';
  daysArea.style.width = (dates.length*colW)+'px';
  appendDayCells(daysArea, dates, colW, person.id, 'montage');

  // Étiquettes montage de cette personne
  const labels = state.etiquettes_montage.filter(e => String(e.personneId) === String(person.id));
  appendLabels(daysArea, labels, dateMap, colW, rangeStart, rangeEnd, LABEL_TYPES_MONTAGE, 'montage');

  // Étiquettes SAV liées à cette personne commune (commonPersonId)
  const savLabels = state.etiquettes_sav.filter(e => String(e.commonPersonId) === String(person.id));
  appendLabels(daysArea, savLabels, dateMap, colW, rangeStart, rangeEnd, LABEL_TYPES_SAV, 'sav');

  row.appendChild(daysArea);
  scroll.appendChild(row);
}

// Rendu d'une ligne "monteur en SAV bloqué"
function appendMonteurZoneRow(scroll, person, noirs, dates, colW, dateMap, rangeStart, rangeEnd) {
  const row = document.createElement('div');
  row.className = 'gr-row monteur-zone';
  row.dataset.personId = person.id;
  row.dataset.source = 'monteur-zone';

  const nameCell = document.createElement('div');
  nameCell.className = 'gr-name';
  const badge = document.createElement('span');
  badge.className = 'group-badge sav-bloque';
  badge.textContent = '⚫ SAV';
  const info = document.createElement('div');
  info.className = 'person-info';
  info.innerHTML = `<div class="person-name">${person.prenom} ${person.nom}</div><div class="person-role">${person.role||''} (bloqué)</div>`;
  nameCell.appendChild(badge); nameCell.appendChild(info);
  row.appendChild(nameCell);

  const daysArea = document.createElement('div');
  daysArea.className = 'gr-days';
  daysArea.style.width = (dates.length*colW)+'px';
  // Pour chaque cellule : dataset particulier (clic = créer étiquette SAV monteur-zone)
  dates.forEach(d => {
    const cell = document.createElement('div');
    cell.className = 'day-cell';
    if (isWeekend(d)) cell.classList.add('weekend');
    if (isFerie(dateStr(d))) cell.classList.add('ferie');
    if (isToday(d)) cell.classList.add('today');
    if (isTodayPlus(d,14)) cell.classList.add('marker-14');
    if (isTodayPlus(d,35)) cell.classList.add('marker-35');
    cell.style.width = colW+'px';
    cell.dataset.date = dateStr(d);
    cell.dataset.personId = person.id;
    cell.dataset.source = 'monteur-zone';
    cell.addEventListener('dblclick', e => {
      if (!e.target.closest('.label-block') && canEdit()) {
        // Trouver le noir actif pour cette date
        const activeNoir = noirs.find(n => n.dateDebut <= cell.dataset.date && n.dateFin >= cell.dataset.date);
        if (!activeNoir) { toast('Pas d\'étiquette noire active sur cette date', 'warning'); return; }
        addSavLabel({estMonteurZone:true, monteurId:person.id, etiquetteNoirId:activeNoir.id, defaultDate:cell.dataset.date});
      }
    });
    daysArea.appendChild(cell);
  });

  // Watermarks pour chaque période noire dans la fenêtre visible
  noirs.forEach(noir => {
    const visStart = noir.dateDebut < rangeStart ? rangeStart : noir.dateDebut;
    const visEnd   = noir.dateFin   > rangeEnd   ? rangeEnd   : noir.dateFin;
    const startIdx = dateMap[visStart], endIdx = dateMap[visEnd];
    if (startIdx === undefined || endIdx === undefined) return;
    const wm = document.createElement('div');
    wm.className = 'noir-watermark';
    wm.style.left = (startIdx*colW + 1)+'px';
    wm.style.width = ((endIdx-startIdx+1)*colW - 2)+'px';
    wm.innerHTML = `<span>${person.prenom} ${person.nom} · SAV BLOQUÉ</span>`;
    wm.title = noir.data?.descriptionSAV ? `SAV bloqué : ${noir.data.descriptionSAV}` : 'SAV bloqué';
    daysArea.appendChild(wm);
  });

  // Étiquettes SAV de la zone monteur pour cette personne
  const labels = state.etiquettes_sav.filter(e =>
    e.estMonteurZone === true && String(e.monteurId) === String(person.id)
  );
  appendLabels(daysArea, labels, dateMap, colW, rangeStart, rangeEnd, LABEL_TYPES_SAV, 'sav');

  row.appendChild(daysArea);
  scroll.appendChild(row);
}

function appendDayCells(daysArea, dates, colW, personId, source) {
  dates.forEach(d => {
    const cell = document.createElement('div');
    cell.className = 'day-cell';
    if (isWeekend(d)) cell.classList.add('weekend');
    if (isFerie(dateStr(d))) cell.classList.add('ferie');
    if (isToday(d)) cell.classList.add('today');
    if (isTodayPlus(d,14)) cell.classList.add('marker-14');
    if (isTodayPlus(d,35)) cell.classList.add('marker-35');
    cell.style.width = colW+'px';
    cell.dataset.date = dateStr(d);
    cell.dataset.personId = personId;
    cell.dataset.source = source;
    cell.addEventListener('dblclick', e => {
      if (!e.target.closest('.label-block') && canEdit()) {
        if (source === 'montage') addMontageLabel(personId, cell.dataset.date);
        else if (source === 'sav') addSavLabel({personneSavId:personId, defaultDate:cell.dataset.date});
      }
    });
    daysArea.appendChild(cell);
  });
}

function appendLabels(daysArea, labels, dateMap, colW, rangeStart, rangeEnd, types, source) {
  // Calculer les chevauchements pour empilage vertical (max 2 voies)
  // Les "vert-indic" sont rendus en bandeau bas et n'entrent pas dans le calcul
  const stackable = labels.filter(l => !(source === 'sav' && l.type === 'vert'));
  const overlapMap = {};
  stackable.forEach(a => {
    stackable.forEach(b => {
      if (a.id === b.id) return;
      if (a.dateDebut <= b.dateFin && a.dateFin >= b.dateDebut) {
        (overlapMap[a.id] = overlapMap[a.id] || new Set()).add(b.id);
      }
    });
  });
  const lane = {};
  stackable.slice().sort((a,b) => a.dateDebut.localeCompare(b.dateDebut)).forEach(lbl => {
    const others = overlapMap[lbl.id];
    if (!others) { lane[lbl.id] = -1; return; }
    const used = new Set();
    others.forEach(oid => { if (lane[oid] !== undefined && lane[oid] >= 0) used.add(lane[oid]); });
    lane[lbl.id] = used.has(0) ? 1 : 0;
  });

  labels.forEach(lbl => {
    if (!lbl.dateDebut || !lbl.dateFin) return;
    if (lbl.dateDebut > rangeEnd || lbl.dateFin < rangeStart) return;
    const visStart = lbl.dateDebut < rangeStart ? rangeStart : lbl.dateDebut;
    const visEnd   = lbl.dateFin   > rangeEnd   ? rangeEnd   : lbl.dateFin;
    const startIdx = dateMap[visStart], endIdx = dateMap[visEnd];
    if (startIdx === undefined || endIdx === undefined) return;
    const typeInfo = types[lbl.type] || {label:lbl.type, color:'#999', text:'light'};
    const lblEl = document.createElement('div');
    const isVertIndic = (source === 'sav' && lbl.type === 'vert');
    let stackClass = '';
    if (lane[lbl.id] === 0) stackClass = ' stack-top';
    else if (lane[lbl.id] === 1) stackClass = ' stack-bot';
    lblEl.className = 'label-block ' + (typeInfo.text === 'dark' ? 'dark-text' : 'light-text') + (isVertIndic ? ' vert-indic' : stackClass);
    lblEl.style.cssText = `left:${startIdx*colW+1}px;width:${(endIdx-startIdx+1)*colW-2}px;background:${typeInfo.color}`;
    lblEl.dataset.labelId = lbl.id;
    lblEl.dataset.source = source;

    let text;
    if (lbl.type === 'vert') text = lbl.data?.texteLibre || 'IH';
    else if (lbl.type === 'noir' && source === 'sav') text = lbl.data?.texteLibre || 'Absent';
    else if (lbl.type === 'rose' && source === 'sav') text = `${lbl.data?.texteLibre||'Formation'}${lbl.data?.lieu?' · '+lbl.data.lieu:''}`;
    else if (source === 'sav') text = `${lbl.data?.numeroInstallation||''}${lbl.data?.adresse?' '+lbl.data.adresse:''}`.trim() || typeInfo.label;
    else { // montage
      if (lbl.type === 'jaune') text = lbl.data?.numeroInstallation || '';
      else if (lbl.type === 'vert') text = lbl.data?.intitule || 'Congé';
      else if (lbl.type === 'orange') text = 'Maladie';
      else if (lbl.type === 'rose') text = lbl.data?.descriptionSAV ? `SAV: ${lbl.data.descriptionSAV}` : 'SAV';
      else if (lbl.type === 'noir') text = lbl.data?.descriptionSAV ? `🔒 ${lbl.data.descriptionSAV}` : '🔒 SAV bloqué';
      else if (lbl.type === 'brun') text = lbl.data?.texteBrun || 'Cas particulier';
      else if (lbl.type === 'autre') text = lbl.data?.texteLibre || 'Autre';
      else text = `${lbl.data?.numeroInstallation||''} ${lbl.data?.lieu||''}`.trim() || typeInfo.label;
    }
    if (lbl.verrouille) text = '🔒 ' + text;
    lblEl.textContent = text;

    // Tooltip
    const tip = [typeInfo.label];
    if (lbl.data?.numeroInstallation) tip.push('N° ' + lbl.data.numeroInstallation);
    if (lbl.data?.adresse) tip.push(lbl.data.adresse);
    if (lbl.data?.numeroDevis) tip.push('Devis ' + lbl.data.numeroDevis);
    if (lbl.data?.texteLibre) tip.push(lbl.data.texteLibre);
    tip.push(`${formatDate(lbl.dateDebut)} → ${formatDate(lbl.dateFin)}`);
    lblEl.title = tip.join('\n');

    attachLabelDrag(lblEl, lbl.id, colW, source);
    lblEl.addEventListener('dblclick', e => { e.stopPropagation(); if (canEdit()) editLabel(lbl.id, source); });
    daysArea.appendChild(lblEl);
  });
}

function onGanttScroll(e) {
  // Pendant l'export JPEG on fige la plage rendue
  if (state._exporting) return;
  const scroll = e.currentTarget;
  const colW = scroll._colWRef || getColWidth();
  const max = scroll.scrollWidth - scroll.clientWidth;
  // Si le contenu n'est pas plus large que le viewport, ne rien étendre
  if (max <= 0) return;
  const left = scroll.scrollLeft;
  if (max - left < colW * 30) {
    state.rangeAfter += 180;
    const sl = scroll.scrollLeft;
    renderGantt();
    document.getElementById('gantt-scroll').scrollLeft = sl;
  } else if (left < colW * 30 && state.rangeBefore < 1800) {
    const sl = scroll.scrollLeft;
    state.rangeBefore += 180;
    renderGantt();
    document.getElementById('gantt-scroll').scrollLeft = sl + 180 * colW;
  }
}

function scrollToDate(targetDate) {
  const scroll = document.getElementById('gantt-scroll');
  if (!scroll || !scroll._datesRef) return;
  const colW = getColWidth();
  const ts = dateStr(targetDate);
  const idx = scroll._datesRef.findIndex(d => dateStr(d) === ts);
  if (idx < 0) return;
  const fixedW = 200;
  const visible = scroll.clientWidth - fixedW;
  scroll.scrollLeft = idx * colW - visible / 3;
}

// ════════════════════════════════════════════════════
// DRAG horizontal (dates) + vertical (réassignation entre rangées)
// ════════════════════════════════════════════════════
function attachLabelDrag(lblEl, labelId, colW, source) {
  let dragMoved = false, startX=0, startY=0, origStart, origEnd, origAssign, businessDur, origNoirId;
  let rafId = null;

  const findLabel = (id, src) => {
    const arr = src === 'montage' ? state.etiquettes_montage : state.etiquettes_sav;
    return arr.find(l => l.id === id);
  };

  // Détecte la rangée sous le curseur (et son contexte : montage / sav / monteur-zone)
  const detectDropRow = (cx, cy) => {
    const elBelow = document.elementFromPoint(cx, cy);
    const rowBelow = elBelow?.closest('.gr-row');
    if (!rowBelow) return null;
    return {
      personId: rowBelow.dataset.personId,
      source: rowBelow.dataset.source, // 'montage' | 'sav' | 'monteur-zone'
    };
  };

  // Trouve l'étiquette noire active sur (monteurId, date)
  const findActiveNoir = (monteurId, date) => {
    return state.etiquettes_montage.find(e =>
      e.type === 'noir' && String(e.personneId) === String(monteurId) &&
      e.dateDebut <= date && e.dateFin >= date
    );
  };

  // Applique une nouvelle assignation à l'étiquette en mémoire
  // Une étiquette SAV peut atterrir sur n'importe quelle rangée (commune / sav team / monteur-zone)
  // Une étiquette montage (commune Menétrey/Burgy) peut être déplacée entre rangées communes uniquement
  const applyAssignment = (lbl, drop) => {
    if (!drop) return false;
    if (source === 'montage') {
      // Migration entre tables (montage → SAV) trop complexe → on limite aux rangées communes
      if (drop.source !== 'montage') return false;
      lbl.personneId = String(drop.personId);
      return true;
    }
    // Étiquette SAV : peut atterrir sur n'importe quelle rangée
    if (drop.source === 'sav') {
      lbl.personneSavId = String(drop.personId);
      delete lbl.estMonteurZone;
      delete lbl.monteurId;
      delete lbl.etiquetteNoirId;
      delete lbl.commonPersonId;
      return true;
    }
    if (drop.source === 'monteur-zone') {
      const noir = findActiveNoir(drop.personId, lbl.dateDebut);
      if (!noir) return false;
      lbl.estMonteurZone = true;
      lbl.monteurId = String(drop.personId);
      lbl.etiquetteNoirId = noir.id;
      delete lbl.personneSavId;
      delete lbl.commonPersonId;
      return true;
    }
    if (drop.source === 'montage') {
      // Étiquette SAV déposée sur une ligne commune → devient liée à la personne commune
      lbl.commonPersonId = String(drop.personId);
      delete lbl.personneSavId;
      delete lbl.estMonteurZone;
      delete lbl.monteurId;
      delete lbl.etiquetteNoirId;
      return true;
    }
    return false;
  };

  const start = (cx, cy, e) => {
    const lbl = findLabel(labelId, source);
    if (!lbl || !canEdit()) return;
    dragMoved = false;
    startX = cx; startY = cy;
    origStart = lbl.dateDebut; origEnd = lbl.dateFin;
    origAssign = source === 'montage'
      ? {personneId: lbl.personneId}
      : {personneSavId: lbl.personneSavId, estMonteurZone: lbl.estMonteurZone, monteurId: lbl.monteurId, etiquetteNoirId: lbl.etiquetteNoirId, commonPersonId: lbl.commonPersonId};
    origNoirId = lbl.etiquetteNoirId; // pour mise à jour travaux_sav après migration
    businessDur = Math.max(1, businessDaysBetween(parseDate(origStart), parseDate(origEnd)));
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    e.preventDefault();
  };

  const onMove = (ev) => move(ev.clientX, ev.clientY);

  const move = (cx, cy) => {
    const dx = cx - startX, dy = cy - startY;
    if (!dragMoved && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
      dragMoved = true;
      lblEl.classList.add('dragging');
      document.body.style.cursor = 'grabbing';
    }
    if (!dragMoved) return;
    const lbl = findLabel(labelId, source);
    if (!lbl) return;
    // Date : dérive horizontale, durée préservée
    const daysDelta = Math.round(dx / colW);
    const newStart = addDays(parseDate(origStart), daysDelta);
    const newEnd = addBusinessDays(newStart, businessDur);
    lbl.dateDebut = dateStr(newStart);
    lbl.dateFin = dateStr(newEnd);
    // Réassignation verticale via détection de la rangée sous le curseur
    const drop = detectDropRow(cx, cy);
    if (drop) applyAssignment(lbl, drop);
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(() => { try { renderGantt(); } catch(e){} });
  };

  const onUp = async () => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.body.style.cursor = '';
    if (!dragMoved) { showLabelDetail(labelId, source); return; }
    const lbl = findLabel(labelId, source);
    if (!lbl) return;
    // Si l'étiquette était (ou est devenue) liée à un noir → mettre à jour les travaux_sav
    // de l'ANCIEN noir (si l'étiquette en a été retirée) ET du NOUVEAU noir
    if (origNoirId && origNoirId !== lbl.etiquetteNoirId) {
      await updateNoirTravauxSav(origNoirId);
    }
    if (source === 'sav' && lbl.estMonteurZone && lbl.etiquetteNoirId) {
      await updateNoirTravauxSav(lbl.etiquetteNoirId);
    }
    renderGantt();
    saveToFile();
    toast('Étiquette déplacée', 'info');
  };

  lblEl.addEventListener('mousedown', e => { if (e.button === 0) { e.stopPropagation(); start(e.clientX, e.clientY, e); } });

  // Touch (long-press 1.5s pour activer le drag flottant)
  let touchTimer = null, touchActive = false, touchSX=0, touchSY=0, touchMoved=false;
  lblEl.addEventListener('touchstart', e => {
    if (!e.touches[0] || e.touches.length>1) return;
    e.stopPropagation();
    touchSX = e.touches[0].clientX; touchSY = e.touches[0].clientY;
    touchActive = false; touchMoved = false;
    setTimeout(() => { if (touchTimer) lblEl.classList.add('long-pressing'); }, 300);
    touchTimer = setTimeout(() => {
      touchTimer = null;
      lblEl.classList.remove('long-pressing');
      const lbl = findLabel(labelId, source);
      if (!lbl || !canEdit()) return;
      touchActive = true;
      lblEl.classList.add('floating');
      origStart = lbl.dateDebut; origEnd = lbl.dateFin;
      origAssign = source === 'montage' ? {personneId: lbl.personneId}
        : {personneSavId: lbl.personneSavId, estMonteurZone: lbl.estMonteurZone, monteurId: lbl.monteurId, etiquetteNoirId: lbl.etiquetteNoirId, commonPersonId: lbl.commonPersonId};
      origNoirId = lbl.etiquetteNoirId;
      businessDur = Math.max(1, businessDaysBetween(parseDate(origStart), parseDate(origEnd)));
      startX = touchSX; startY = touchSY;
      dragMoved = true;
      if (navigator.vibrate) try { navigator.vibrate(40); } catch(e){}
    }, 1500);
  }, {passive:true});
  lblEl.addEventListener('touchmove', e => {
    if (!e.touches[0]) return;
    if (!touchActive) {
      if (Math.abs(e.touches[0].clientX-touchSX)>12 || Math.abs(e.touches[0].clientY-touchSY)>12) {
        if (touchTimer) { clearTimeout(touchTimer); touchTimer=null; }
        lblEl.classList.remove('long-pressing');
        touchMoved = true;
      }
      return;
    }
    e.preventDefault(); e.stopPropagation();
    move(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive:false});
  lblEl.addEventListener('touchend', () => {
    if (touchTimer) { clearTimeout(touchTimer); touchTimer=null; }
    lblEl.classList.remove('long-pressing');
    if (touchActive) { touchActive=false; lblEl.classList.remove('floating','dragging'); onUp(); }
    else if (!touchMoved) showLabelDetail(labelId, source);
  });
}

function closeAllPopups() {
  document.getElementById('detail-popup')?.remove();
  document.removeEventListener('click', closeOnOutside);
}
function closeOnOutside(e) {
  const p = document.getElementById('detail-popup');
  if (p && !p.contains(e.target)) closeAllPopups();
}

function showLabelDetail(labelId, source) {
  closeAllPopups();
  const arr = source === 'montage' ? state.etiquettes_montage : state.etiquettes_sav;
  const lbl = arr.find(l => l.id === labelId);
  if (!lbl) return;
  const types = source === 'montage' ? LABEL_TYPES_MONTAGE : LABEL_TYPES_SAV;
  const typeInfo = types[lbl.type] || {label:lbl.type, color:'#999'};
  let personName = '?';
  if (source === 'montage') {
    const p = state.personnes_montage.find(x => String(x.id) === String(lbl.personneId));
    personName = p ? `${p.prenom} ${p.nom}` : '?';
  } else if (lbl.estMonteurZone) {
    const m = state.personnes_montage.find(x => String(x.id) === String(lbl.monteurId));
    personName = m ? `${m.prenom} ${m.nom} (Monteur en SAV)` : '?';
  } else {
    const p = state.personnes_sav.find(x => String(x.id) === String(lbl.personneSavId));
    personName = p ? `${p.prenom} ${p.nom}` : '?';
  }

  const rows = [
    ['Personne', personName],
    ['Type', typeInfo.label],
    ['Du', formatDate(lbl.dateDebut)],
    ['Au', formatDate(lbl.dateFin)],
    ['Durée', businessDaysBetween(lbl.dateDebut, lbl.dateFin) + ' j ouvrables'],
    ['Créé par', lbl.creePar||'—'],
  ];
  const d = lbl.data || {};
  if (d.numeroInstallation) rows.push(['N° installation', d.numeroInstallation]);
  if (d.adresse) rows.push(['Adresse', d.adresse]);
  if (d.numeroDevis) rows.push(['N° devis', d.numeroDevis]);
  if (d.lieu) rows.push(['Lieu', d.lieu]);
  if (d.texteLibre) rows.push(['Description', d.texteLibre]);
  if (d.descriptionSAV) rows.push(['Description SAV', d.descriptionSAV]);
  if (d.travauxRestants) rows.push(['Travaux restants', d.travauxRestants]);

  // Travaux SAV assignés (uniquement sur étiquettes noires côté montage)
  let travauxSavHtml = '';
  if (source === 'montage' && lbl.type === 'noir' && Array.isArray(d.travaux_sav) && d.travaux_sav.length > 0) {
    travauxSavHtml = `<div class="travaux-sav-list">
      <div style="font-size:11px;font-weight:600;color:#fca5a5;margin-bottom:4px">🛠️ Travaux SAV assignés (${d.travaux_sav.length})</div>
      ${d.travaux_sav.map(t => {
        const tcol = LABEL_TYPES_SAV[t.type]?.color || '#999';
        const tlabel = LABEL_TYPES_SAV[t.type]?.label || t.type;
        return `<div class="ts-item"><span class="ts-type" style="background:${tcol}"></span><strong>${tlabel}</strong> · ${t.numeroInstallation||''} · ${formatDate(t.dateDebut)}→${formatDate(t.dateFin)}<br><span style="margin-left:14px;color:var(--text-faint)">${t.description||''}</span></div>`;
      }).join('')}
    </div>`;
  }

  const popup = document.createElement('div');
  popup.id = 'detail-popup';
  popup.className = 'detail-popup';
  popup.style.cssText = 'top:50%;left:50%;transform:translate(-50%,-50%);position:fixed';
  popup.innerHTML = `
    <div class="popup-header" style="background:${typeInfo.color}">
      <span>${typeInfo.label}</span>
    </div>
    <div class="popup-body">
      ${rows.map(([k,v]) => `<div class="popup-row"><span class="pkey">${k}</span><span class="pval">${v}</span></div>`).join('')}
      ${travauxSavHtml}
    </div>
    <div class="popup-actions">
      ${canEdit() ? `<button class="btn btn-secondary btn-sm" onclick="editLabel('${lbl.id}','${source}');closeAllPopups()">✏️ Modifier</button>` : ''}
      ${canEdit() ? `<button class="btn btn-danger btn-sm" onclick="deleteLabelHere('${lbl.id}','${source}')">🗑️ Supprimer</button>` : ''}
      <button class="btn btn-secondary btn-sm" onclick="closeAllPopups()">Fermer</button>
    </div>
  `;
  document.body.appendChild(popup);
  setTimeout(() => document.addEventListener('click', closeOnOutside, {once:true}), 50);
}

function createModal(title) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay';
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header"><h2>${title}</h2><button class="btn btn-secondary btn-sm" onclick="closeModal()">✕</button></div>
      <div class="modal-body"></div>
      <div class="modal-footer"></div>
    </div>`;
  return overlay;
}

// Sur ligne commune (Menétrey/Burgy) → étiquette dans table montage OU SAV selon type choisi
function addMontageLabel(personId, defaultDate) {
  closeAllPopups();
  const modal = createModal('Nouvelle étiquette');
  const body = modal.querySelector('.modal-body');
  const sectionHeader = title => {
    const h = document.createElement('div');
    h.style.cssText = 'font-size:11px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.08em;margin:6px 0 8px;border-bottom:1px solid var(--border);padding-bottom:6px';
    h.textContent = title;
    return h;
  };
  const buildGrid = (types, onPick) => {
    const grid = document.createElement('div');
    grid.className = 'type-grid';
    Object.entries(types).forEach(([key, info]) => {
      const opt = document.createElement('div');
      opt.className = 'type-option'; opt.style.color = info.color;
      opt.innerHTML = `<div class="type-swatch" style="background:${info.color}"></div><div class="type-name">${info.label}</div>`;
      opt.addEventListener('click', () => { closeModal(); onPick(key); });
      grid.appendChild(opt);
    });
    return grid;
  };
  body.appendChild(sectionHeader('🏗️ Type Montage (table etiquettes)'));
  body.appendChild(buildGrid(LABEL_TYPES_MONTAGE, key => showMontageLabelForm(null, key, personId, defaultDate)));
  body.appendChild(sectionHeader('🛠️ Type SAV (table etiquettes_sav)'));
  body.appendChild(buildGrid(LABEL_TYPES_SAV, key => showSavLabelForm(null, key, {commonPersonId:personId, defaultDate})));
  modal.querySelector('.modal-footer').innerHTML = '<button class="btn btn-secondary" onclick="closeModal()">Annuler</button>';
  document.body.appendChild(modal);
}

// Sur équipe SAV ou monteur zone → étiquette dans etiquettes_sav
function addSavLabel(opts) {
  closeAllPopups();
  const modal = createModal(opts.estMonteurZone ? 'Nouvelle étiquette SAV (monteur)' : 'Nouvelle étiquette SAV');
  const body = modal.querySelector('.modal-body');
  const grid = document.createElement('div');
  grid.className = 'type-grid';
  Object.entries(LABEL_TYPES_SAV).forEach(([key, info]) => {
    const opt = document.createElement('div');
    opt.className = 'type-option'; opt.style.color = info.color;
    opt.innerHTML = `<div class="type-swatch" style="background:${info.color}"></div><div class="type-name">${info.label}</div>`;
    opt.addEventListener('click', () => { closeModal(); showSavLabelForm(null, key, opts); });
    grid.appendChild(opt);
  });
  body.appendChild(grid);
  modal.querySelector('.modal-footer').innerHTML = '<button class="btn btn-secondary" onclick="closeModal()">Annuler</button>';
  document.body.appendChild(modal);
}

function editLabel(labelId, source) {
  closeAllPopups();
  const arr = source === 'montage' ? state.etiquettes_montage : state.etiquettes_sav;
  const lbl = arr.find(l => l.id === labelId);
  if (!lbl) return;
  if (source === 'montage') showMontageLabelForm(labelId, lbl.type, lbl.personneId, lbl.dateDebut);
  else showSavLabelForm(labelId, lbl.type, {
    personneSavId: lbl.personneSavId,
    estMonteurZone: lbl.estMonteurZone,
    monteurId: lbl.monteurId,
    etiquetteNoirId: lbl.etiquetteNoirId,
    commonPersonId: lbl.commonPersonId,
    defaultDate: lbl.dateDebut,
  });
}

function showMontageLabelForm(labelId, type, personId, preDate) {
  const existing = labelId ? state.etiquettes_montage.find(l => l.id === labelId) : null;
  const typeInfo = LABEL_TYPES_MONTAGE[type] || LABEL_TYPES_MONTAGE.autre;
  const modal = createModal(existing ? `Modifier : ${typeInfo.label}` : `Nouvelle : ${typeInfo.label}`);
  const dot = document.createElement('div');
  dot.className = 'type-dot'; dot.style.background = typeInfo.color;
  modal.querySelector('.modal-header').insertBefore(dot, modal.querySelector('.modal-header').firstChild);
  const body = modal.querySelector('.modal-body');
  const today = dateStr(new Date());
  const d = existing?.data || {};
  const isSAV = type === 'rose' || type === 'noir';
  body.innerHTML = `
    <div class="form-row">
      <div class="form-group"><label>Date début</label><input type="date" id="f-debut" value="${existing?.dateDebut||preDate||today}"></div>
      <div class="form-group"><label>Durée (j ouvr.)</label><input type="number" id="f-duree" min="1" value="${existing?businessDaysBetween(existing.dateDebut,existing.dateFin):1}"></div>
    </div>
    <div class="form-group"><label>N° installation</label><input id="f-num" value="${d.numeroInstallation||''}"></div>
    <div class="form-group"><label>Lieu / Adresse</label><input id="f-lieu" value="${d.lieu||d.adresse||''}"></div>
    ${isSAV ? `<div class="form-group"><label>Description</label><textarea id="f-desc" rows="2">${d.descriptionSAV||''}</textarea></div>` : ''}
    <div id="f-error" class="form-error"></div>
  `;
  modal.querySelector('.modal-footer').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
    <button class="btn btn-primary" onclick="submitMontageLabel('${labelId||''}','${type}','${personId}')">${existing?'Enregistrer':'Créer'}</button>
  `;
  document.body.appendChild(modal);
}

async function submitMontageLabel(labelId, type, personId) {
  const debut = document.getElementById('f-debut').value;
  const dur = Math.max(1, parseInt(document.getElementById('f-duree').value)||1);
  if (!debut) { document.getElementById('f-error').textContent='Date requise'; return; }
  const fin = dateStr(addBusinessDays(parseDate(debut), dur));
  const data = {};
  if (document.getElementById('f-num')?.value) data.numeroInstallation = document.getElementById('f-num').value;
  if (document.getElementById('f-lieu')?.value) data.lieu = document.getElementById('f-lieu').value;
  if (document.getElementById('f-desc')?.value) data.descriptionSAV = document.getElementById('f-desc').value;
  if (labelId) {
    const idx = state.etiquettes_montage.findIndex(l => l.id === labelId);
    if (idx >= 0) {
      state.etiquettes_montage[idx] = {...state.etiquettes_montage[idx], dateDebut:debut, dateFin:fin, data:{...state.etiquettes_montage[idx].data, ...data}};
    }
  } else {
    state.etiquettes_montage.push({
      id: uid(), personneId: String(personId), type, dateDebut:debut, dateFin:fin,
      data, verrouille: type === 'noir', creePar: state.currentUser, history:[]
    });
  }
  closeModal();
  renderGantt();
  saveToFile();
  toast(labelId ? 'Étiquette modifiée' : 'Étiquette créée', 'success');
}

function showSavLabelForm(labelId, type, opts) {
  const existing = labelId ? state.etiquettes_sav.find(l => l.id === labelId) : null;
  const typeInfo = LABEL_TYPES_SAV[type] || {label:type, color:'#999'};
  const modal = createModal(existing ? `Modifier : ${typeInfo.label}` : `Nouvelle : ${typeInfo.label}`);
  const dot = document.createElement('div');
  dot.className = 'type-dot'; dot.style.background = typeInfo.color;
  modal.querySelector('.modal-header').insertBefore(dot, modal.querySelector('.modal-header').firstChild);
  const body = modal.querySelector('.modal-body');
  const today = dateStr(new Date());
  const d = existing?.data || {};
  const fields = SAV_FIELDS[type] || ['texteLibre'];
  let html = `
    <div class="form-row">
      <div class="form-group"><label>Date début</label><input type="date" id="f-debut" value="${existing?.dateDebut||opts.defaultDate||today}"></div>
      <div class="form-group"><label>Durée (j ouvr.)</label><input type="number" id="f-duree" min="1" value="${existing?businessDaysBetween(existing.dateDebut,existing.dateFin):(type==='vert'?1:1)}"></div>
    </div>`;
  if (fields.includes('numeroInstallation')) html += `<div class="form-group"><label>N° installation</label><input id="f-num" value="${d.numeroInstallation||''}"></div>`;
  if (fields.includes('adresse')) html += `<div class="form-group"><label>Adresse</label><input id="f-adresse" value="${d.adresse||''}"></div>`;
  if (fields.includes('numeroDevis')) html += `<div class="form-group"><label>N° devis</label><input id="f-devis" value="${d.numeroDevis||''}"></div>`;
  if (fields.includes('lieu')) html += `<div class="form-group"><label>Lieu</label><input id="f-lieu" value="${d.lieu||''}"></div>`;
  if (fields.includes('texteLibre')) html += `<div class="form-group"><label>${type==='vert'?'Texte (ex: 8h30, AB)':'Texte / Description'}</label><${type==='vert'?'input':'textarea rows="2"'} id="f-texte">${d.texteLibre||''}</${type==='vert'?'input':'textarea'}>${type==='vert'?'value="'+(d.texteLibre||'')+'"':''}</div>`;
  html += `<div id="f-error" class="form-error"></div>`;
  body.innerHTML = html;
  // Personne — si zone monteur OU ligne commune, pas de sélecteur
  if (!opts.estMonteurZone && !opts.commonPersonId && !existing?.commonPersonId) {
    const personSel = document.createElement('div');
    personSel.className = 'form-group';
    const sel = `<select id="f-person-sav">${state.personnes_sav.filter(p=>p.actif).map(p =>
      `<option value="${p.id}" ${(opts.personneSavId===p.id||existing?.personneSavId===p.id)?'selected':''}>${p.prenom} ${p.nom} (${p.role||''})</option>`
    ).join('')}</select>`;
    personSel.innerHTML = `<label>Personne SAV</label>${sel}`;
    body.insertBefore(personSel, body.firstChild);
  } else if (opts.commonPersonId || existing?.commonPersonId) {
    const cId = opts.commonPersonId || existing.commonPersonId;
    const cPerson = state.personnes_montage.find(p => String(p.id) === String(cId));
    if (cPerson) {
      const info = document.createElement('div');
      info.className = 'form-group';
      info.innerHTML = `<label>Ligne commune</label><div style="padding:8px 11px;background:var(--bg-elev-1);border:1px solid var(--border);border-radius:6px;font-weight:500">${cPerson.prenom} ${cPerson.nom}</div>`;
      body.insertBefore(info, body.firstChild);
    }
  }
  modal.querySelector('.modal-footer').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
    <button class="btn btn-primary" id="sav-submit-btn">${existing?'Enregistrer':'Créer'}</button>
  `;
  document.body.appendChild(modal);
  document.getElementById('sav-submit-btn').addEventListener('click', () => submitSavLabel(labelId||'', type, opts));
}

async function submitSavLabel(labelId, type, opts) {
  const debut = document.getElementById('f-debut').value;
  const dur = Math.max(1, parseInt(document.getElementById('f-duree').value)||1);
  if (!debut) { document.getElementById('f-error').textContent='Date requise'; return; }
  const fin = dateStr(addBusinessDays(parseDate(debut), dur));
  const data = {};
  ['f-num','f-adresse','f-devis','f-lieu','f-texte'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const map = {'f-num':'numeroInstallation','f-adresse':'adresse','f-devis':'numeroDevis','f-lieu':'lieu','f-texte':'texteLibre'};
    if (el.value) data[map[id]] = el.value;
  });
  const personneSavSel = document.getElementById('f-person-sav');
  const personneSavId = opts.estMonteurZone ? null : (personneSavSel?.value || opts.personneSavId);
  if (labelId) {
    const idx = state.etiquettes_sav.findIndex(l => l.id === labelId);
    if (idx >= 0) {
      state.etiquettes_sav[idx] = {
        ...state.etiquettes_sav[idx],
        dateDebut: debut, dateFin: fin, data: {...state.etiquettes_sav[idx].data, ...data},
        ...(personneSavId !== null && {personneSavId})
      };
      // Mise à jour travaux_sav si zone monteur
      if (state.etiquettes_sav[idx].estMonteurZone) {
        await updateNoirTravauxSav(state.etiquettes_sav[idx].etiquetteNoirId);
      }
    }
  } else {
    let assignment;
    if (opts.estMonteurZone) {
      assignment = {estMonteurZone:true, monteurId:String(opts.monteurId), etiquetteNoirId:String(opts.etiquetteNoirId)};
    } else if (opts.commonPersonId) {
      assignment = {commonPersonId: String(opts.commonPersonId)};
    } else {
      assignment = {personneSavId};
    }
    const newLbl = {
      id: uid(), type, dateDebut: debut, dateFin: fin, data,
      creePar: state.currentUser, history: [],
      ...assignment
    };
    state.etiquettes_sav.push(newLbl);
    if (newLbl.estMonteurZone) await updateNoirTravauxSav(newLbl.etiquetteNoirId);
  }
  closeModal();
  renderGantt();
  saveToFile();
  toast(labelId ? 'Étiquette modifiée' : 'Étiquette créée', 'success');
}

// Mise à jour de l'étiquette noire côté montage avec la liste des travaux SAV assignés
async function updateNoirTravauxSav(noirId) {
  if (!noirId) return;
  const idx = state.etiquettes_montage.findIndex(l => l.id === noirId);
  if (idx < 0) return;
  const noir = state.etiquettes_montage[idx];
  // Trouver toutes les étiquettes SAV liées à ce noir
  const travaux = state.etiquettes_sav
    .filter(e => e.estMonteurZone && String(e.etiquetteNoirId) === String(noirId))
    .map(e => ({
      id: e.id,
      type: e.type,
      numeroInstallation: e.data?.numeroInstallation || '',
      dateDebut: e.dateDebut,
      dateFin: e.dateFin,
      description: e.data?.texteLibre || e.data?.adresse || '',
      creePar: e.creePar || '',
      creeAt: e.creeAt || new Date().toISOString(),
    }));
  noir.data = {...noir.data, travaux_sav: travaux};
  state.etiquettes_montage[idx] = noir;
}

async function deleteLabelHere(labelId, source) {
  if (!confirm('Supprimer cette étiquette ?')) return;
  closeAllPopups();
  if (source === 'montage') {
    state.etiquettes_montage = state.etiquettes_montage.filter(l => l.id !== labelId);
    // Note : suppression d'une étiquette montage côté SAV est rare (juste pour Menétrey/Burgy)
    // On ne supprime PAS via les tables ici (la table etiquettes appartient au planning montage)
    // mais on doit faire un upsert pour ne pas la recréer. En réalité il faut un delete explicite.
    const { error } = await sb.from('etiquettes').delete().eq('id', String(labelId));
    if (error) { toast('Erreur suppression : '+error.message, 'error'); return; }
  } else {
    const lbl = state.etiquettes_sav.find(l => l.id === labelId);
    state.etiquettes_sav = state.etiquettes_sav.filter(l => l.id !== labelId);
    if (lbl?.estMonteurZone && lbl.etiquetteNoirId) {
      await updateNoirTravauxSav(lbl.etiquetteNoirId);
    }
  }
  renderGantt();
  saveToFile();
  toast('Étiquette supprimée', 'success');
}

async function saveSavPont() {
  const date = document.getElementById('pont-date').value;
  const nom = document.getElementById('pont-nom').value.trim() || 'Pont offert';
  if (!date) { toast('Date requise', 'error'); return; }
  if (!state.ponts) state.ponts = [];
  const pont = { id: uid(), date, nom };
  state.ponts.push(pont);
  // Push direct dans la table ponts (le sync principal ne pousse que SAV+etiquettes)
  if (sb && state.session) await sb.from('ponts').upsert({id: pont.id, body: pont});
  closeModal();
  renderGantt();
  toast('Pont enregistré', 'success');
}
async function deleteSavPont(id) {
  if (!confirm('Supprimer ce pont ?')) return;
  state.ponts = (state.ponts||[]).filter(p => p.id !== id);
  if (sb && state.session) await sb.from('ponts').delete().eq('id', id);
  closeModal();
  renderGantt();
  manageEvents();
  toast('Pont supprimé', 'info');
}

async function saveSavReunion() {
  const date = document.getElementById('reu-date').value;
  const dur = Math.max(1, parseInt(document.getElementById('reu-duree').value)||1);
  const texte = document.getElementById('reu-texte').value.trim() || "Réunion d'équipe SAV";
  const ids = [...document.querySelectorAll('.reu-pers:checked')].map(c => c.value);
  if (!date) { toast('Date requise', 'error'); return; }
  if (ids.length === 0) { toast('Sélectionnez au moins une personne', 'error'); return; }
  const fin = dateStr(addBusinessDays(parseDate(date), dur));
  const reuId = uid();
  ids.forEach(personneSavId => {
    state.etiquettes_sav.push({
      id: uid(), type: 'rose', personneSavId: String(personneSavId),
      dateDebut: date, dateFin: fin,
      data: { texteLibre: texte, reunionSavId: reuId },
      creePar: state.currentUser, history: []
    });
  });
  closeModal();
  renderGantt();
  saveToFile();
  toast(`Réunion créée pour ${ids.length} personne(s)`, 'success');
}
async function deleteSavReunion(reuId) {

  state.etiquettes_sav = state.etiquettes_sav.filter(e => e.data?.reunionSavId !== reuId);
  closeModal();
  renderGantt();
  saveToFile();
  manageEvents();
  toast('Réunion supprimée', 'info');
}

  const grp = document.getElementById('sp-equipe-group');

function submitSavPerson(personId) {
  const prenom = document.getElementById('sp-prenom').value.trim();
  const nom = document.getElementById('sp-nom').value.trim();
  const sousgroupe = document.getElementById('sp-sg').value;
  const role = document.getElementById('sp-role').value.trim();
  // équipe (chef rattaché) — vide pour les chefs
  const equipe = sousgroupe === 'chef' ? null : (document.getElementById('sp-equipe')?.value || null);
  if (!prenom || !nom) { alert('Prénom et nom requis'); return; }
  if (personId) {
    const p = state.personnes_sav.find(x => x.id === personId);
    if (p) Object.assign(p, {prenom, nom, sousgroupe, role, equipe});
  } else {
    state.personnes_sav.push({id: uid(), prenom, nom, sousgroupe, role, equipe, actif: true});
  }
  closeModal();
  renderGantt();
  saveToFile();
  toast(personId?'Personne modifiée':'Personne ajoutée','success');
}

function deleteSavPerson(personId) {
  const p = state.personnes_sav.find(x => x.id === personId);
  if (!p) return;
  if (!confirm(`Supprimer ${p.prenom} ${p.nom} ?`)) return;
  state.personnes_sav = state.personnes_sav.filter(x => x.id !== personId);
  // Note : les étiquettes attachées à cette personne deviennent orphelines
  closeModal();
  renderGantt();
