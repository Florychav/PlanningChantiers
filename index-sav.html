// EXPORT PDF — modale de choix de semaine puis génération
// ════════════════════════════════════════════════════
function exportWeekJPEG() {
  if (!window.html2canvas) { toast('html2canvas non chargé', 'error'); return; }
  if (!(window.jspdf && window.jspdf.jsPDF)) { toast('jsPDF non chargé', 'error'); return; }
  // Modale de sélection de la semaine
  const modal = createModal('Exporter une semaine en PDF');
  const body = modal.querySelector('.modal-body');
  const today = new Date();
  const curWeek = getWeekNum(today);
  const curYear = today.getFullYear();
  body.innerHTML = `
    <div class="form-group">
      <label>Sélection par n° de semaine</label>
      <div class="form-row">
        <div><input type="number" id="exp-week" min="1" max="53" value="${curWeek}"></div>
        <div><input type="number" id="exp-year" min="2024" max="2030" value="${curYear}"></div>
      </div>
      <div class="form-note" style="font-size:11px;color:var(--text-faint);margin-top:4px">Numéro de semaine ISO (1-53) et année</div>
    </div>
    <div class="form-group">
      <label>OU sélection par date (n'importe quel jour de la semaine)</label>
      <input type="date" id="exp-date" value="${dateStr(today)}">
    </div>
    <div id="exp-preview" style="margin-top:6px;padding:10px 12px;background:var(--bg-elev-1);border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text-muted)"></div>
  `;
  modal.querySelector('.modal-footer').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
    <button class="btn btn-primary" onclick="_doExportWeekJPEG()">📄 Générer le PDF</button>
  `;
  document.body.appendChild(modal);
  // Sync date <-> n° semaine
  const updatePreview = () => {
    const d = parseDate(document.getElementById('exp-date').value);
    const mon = getMonday(d);
    const sun = addDays(mon, 6);
    document.getElementById('exp-preview').textContent =
      `Semaine ${getWeekNum(mon)} (${mon.getFullYear()}) — du ${formatDate(dateStr(mon))} au ${formatDate(dateStr(sun))}`;
  };
  document.getElementById('exp-week').addEventListener('input', () => {
    const w = parseInt(document.getElementById('exp-week').value);
    const y = parseInt(document.getElementById('exp-year').value);
    if (!w || !y) return;
    // Convertir n° de semaine ISO + année → date du lundi
    // Algo : 4 janvier de l'année est toujours dans la semaine 1
    const jan4 = new Date(y, 0, 4);
    const jan4Mon = getMonday(jan4);
    const targetMon = addDays(jan4Mon, (w-1)*7);
    document.getElementById('exp-date').value = dateStr(targetMon);
    updatePreview();
  });
  document.getElementById('exp-year').addEventListener('input', () => document.getElementById('exp-week').dispatchEvent(new Event('input')));
  document.getElementById('exp-date').addEventListener('input', () => {
    const d = parseDate(document.getElementById('exp-date').value);
    document.getElementById('exp-week').value = getWeekNum(d);
    document.getElementById('exp-year').value = d.getFullYear();
    updatePreview();
  });
  updatePreview();
}

async function _doExportWeekJPEG() {
  const dateInput = document.getElementById('exp-date').value;
  if (!dateInput) { toast('Date requise', 'error'); return; }
  const targetDate = parseDate(dateInput);
  closeModal();
  // Sauvegarder l'état actuel pour restauration
  const saved = { view: state.view, rangeBefore: state.rangeBefore, rangeAfter: state.rangeAfter, anchorDate: state.anchorDate };
  // Bloquer l'auto-extension de la plage pendant l'export
  state._exporting = true;
  // Forcer la vue semaine zoomée sur exactement 7 jours, ancrée sur la date demandée
  state.view = 'semaine';
  state.rangeBefore = 0;
  state.rangeAfter = 7;
  state.anchorDate = getMonday(targetDate);
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view==='semaine'));
  renderGantt();
  // Forcer le scroll à 0 pour éviter tout déclenchement de l'auto-scroll handler
  document.getElementById('gantt-scroll').scrollLeft = 0;
  await new Promise(r => setTimeout(r, 350));

  const monday = getMonday(targetDate);
  const sunday = addDays(monday, 6);
  const monStr = dateStr(monday), sunStr = dateStr(sunday);
  const weekNum = getWeekNum(monday);

  // Conteneur off-screen pour la capture
  // NB : on évite "left:-99999px" car cela combiné aux .gr-name en position:sticky
  // projetait les noms hors de leur ligne (à droite). On rend le conteneur
  // hors viewport vertical (top:100vh) mais sans visibility:hidden, sinon
  // html2canvas n'imprime pas les textes des noms.
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;left:0;top:100vh;background:#16161a;padding:24px;width:auto;font-family:Inter,-apple-system,sans-serif;color:#ededee;pointer-events:none;z-index:-1';

  // En-tête
  const headerEl = document.createElement('div');
  headerEl.style.cssText = 'display:flex;align-items:center;gap:14px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #33333a';
  headerEl.innerHTML = `
    <img src="https://menetrey-lift.ch/wp-content/uploads/2022/05/logotest-web.png" style="height:36px;filter:brightness(0) invert(1)" crossorigin="anonymous">
    <div style="flex:1">
      <div style="font-size:10px;color:#a1a1a8;text-transform:uppercase;letter-spacing:.1em;font-weight:500">Planning SAV — Ascenseurs Menétrey SA</div>
      <h1 style="font-size:22px;font-weight:700;margin:2px 0;letter-spacing:-.02em">Semaine ${weekNum}</h1>
      <div style="font-size:13px;color:#a1a1a8">du ${formatDate(monStr)} au ${formatDate(sunStr)}</div>
    </div>
    <div style="font-size:10px;color:#6e6e76;text-align:right">
      Export du ${new Date().toLocaleDateString('fr-CH')} ${new Date().toLocaleTimeString('fr-CH').slice(0,5)}
    </div>`;
  container.appendChild(headerEl);

  // Cloner le gantt (sans scroll, hauteur naturelle)
  const ganttClone = document.getElementById('gantt-scroll').cloneNode(true);
  ganttClone.style.cssText = 'overflow:visible;height:auto;max-height:none;width:auto';
  // Neutraliser position:sticky des colonnes "nom" : sans ancêtre scrollable,
  // sticky+left:0 colle l'élément au bord gauche du viewport, ce qui projette
  // les noms (container off-screen à -99999px) à l'extrême droite des lignes.
  ganttClone.querySelectorAll('.gr-name, .gr-corner, .gr-block-name').forEach(el => {
    el.style.position = 'static';
    el.style.left = 'auto';
  });
  container.appendChild(ganttClone);

  // ── Détail des étiquettes de la semaine ──
  const inWeek = (a, b) => a <= sunStr && b >= monStr;
  const commune = getLignesCommunes().map(p => String(p.id));
  const collected = [];
  state.etiquettes_montage
    .filter(e => commune.includes(String(e.personneId)) && inWeek(e.dateDebut, e.dateFin))
    .forEach(e => collected.push({lbl:e, source:'commune-montage'}));
  state.etiquettes_sav
    .filter(e => inWeek(e.dateDebut, e.dateFin))
    .forEach(e => collected.push({lbl:e, source:'sav'}));

  // Grouper par personne
  const byPerson = new Map();
  const personLabel = (lbl, source) => {
    if (source === 'commune-montage') {
      const p = state.personnes_montage.find(x => String(x.id) === String(lbl.personneId));
      return p ? `${p.prenom} ${p.nom} · ligne commune` : '?';
    }
    if (lbl.commonPersonId) {
      const p = state.personnes_montage.find(x => String(x.id) === String(lbl.commonPersonId));
      return p ? `${p.prenom} ${p.nom} · ligne commune` : '?';
    }
    if (lbl.estMonteurZone) {
      const p = state.personnes_montage.find(x => String(x.id) === String(lbl.monteurId));
      return p ? `${p.prenom} ${p.nom} · ⚫ SAV bloqué` : '?';
    }
    const p = state.personnes_sav.find(x => String(x.id) === String(lbl.personneSavId));
    return p ? `${p.prenom} ${p.nom}${p.role?' · '+p.role:''}` : '?';
  };
  collected.forEach(x => {
    const k = personLabel(x.lbl, x.source);
    if (!byPerson.has(k)) byPerson.set(k, []);
    byPerson.get(k).push(x);
  });

  // Bloc détails
  const detailsEl = document.createElement('div');
  detailsEl.style.cssText = 'margin-top:24px';
  detailsEl.innerHTML = `<h2 style="font-size:15px;font-weight:600;margin-bottom:10px;color:#ededee">📋 Détail des étiquettes (${collected.length})</h2>`;
  if (collected.length === 0) {
    detailsEl.innerHTML += '<div style="color:#a1a1a8;font-style:italic;font-size:12px">Aucune étiquette cette semaine</div>';
  } else {
    [...byPerson.entries()].sort((a,b) => a[0].localeCompare(b[0])).forEach(([person, items]) => {
      const block = document.createElement('div');
      block.style.cssText = 'margin-bottom:10px;padding:10px 12px;background:#1d1d22;border-radius:6px;border:1px solid #33333a';
      block.innerHTML = `<div style="font-weight:600;font-size:13px;margin-bottom:6px;color:#ededee">${person}</div>`;
      items.sort((a,b) => a.lbl.dateDebut.localeCompare(b.lbl.dateDebut)).forEach(({lbl, source}) => {
        const types = (source === 'commune-montage') ? LABEL_TYPES_MONTAGE : LABEL_TYPES_SAV;
        const ti = types[lbl.type] || {label:lbl.type, color:'#999'};
        const fields = [];
        if (lbl.data?.numeroInstallation) fields.push('N° ' + lbl.data.numeroInstallation);
        if (lbl.data?.adresse) fields.push(lbl.data.adresse);
        if (lbl.data?.lieu) fields.push(lbl.data.lieu);
        if (lbl.data?.numeroDevis) fields.push('Devis ' + lbl.data.numeroDevis);
        if (lbl.data?.texteLibre) fields.push(lbl.data.texteLibre);
        if (lbl.data?.descriptionSAV) fields.push('SAV: ' + lbl.data.descriptionSAV);
        if (lbl.data?.intitule) fields.push(lbl.data.intitule);
        const dateRange = (lbl.dateDebut === lbl.dateFin)
          ? formatDate(lbl.dateDebut)
          : `${formatDate(lbl.dateDebut)} → ${formatDate(lbl.dateFin)}`;
        block.innerHTML += `<div style="display:flex;gap:10px;font-size:11.5px;padding:5px 0;border-top:1px dotted #33333a;line-height:1.4">
          <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${ti.color};margin-top:3px;flex-shrink:0;border:1px solid rgba(255,255,255,.1)"></span>
          <span style="color:#a1a1a8;flex:0 0 130px">${dateRange}</span>
          <strong style="flex:0 0 120px;color:#ededee">${ti.label}</strong>
          <span style="flex:1;color:#ededee">${fields.join(' · ') || '—'}</span>
        </div>`;
      });
      detailsEl.appendChild(block);
    });
  }
  container.appendChild(detailsEl);

  // Footer
  const footer = document.createElement('div');
  footer.style.cssText = 'margin-top:18px;padding-top:10px;border-top:1px solid #33333a;font-size:10px;color:#6e6e76;text-align:center';
  footer.textContent = 'Ascenseurs Menétrey SA · manufacture suisse depuis 1924';
  container.appendChild(footer);

  document.body.appendChild(container);

  let canvas;
  try {
    canvas = await html2canvas(container, {
      scale: 1.6,
      backgroundColor: '#16161a',
      useCORS: true,
      logging: false,
      windowWidth: container.scrollWidth + 60,
    });
  } catch (e) {
    toast('Erreur capture : ' + e.message, 'error');
    container.remove();
    return;
  }
  container.remove();

  // Restaurer l'état
  state.view = saved.view;
  state.rangeBefore = saved.rangeBefore;
  state.rangeAfter = saved.rangeAfter;
  state.anchorDate = saved.anchorDate;
  state._exporting = false;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view===saved.view));
  renderGantt();
  requestAnimationFrame(() => scrollToDate(saved.anchorDate));

  // Génération PDF
  try {
    const { jsPDF } = window.jspdf;
    const imgData = canvas.toDataURL('image/jpeg', 0.92);
    const orientation = canvas.width >= canvas.height ? 'landscape' : 'portrait';
    const pdf = new jsPDF({ orientation, unit: 'pt', format: 'a4', compress: true });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const margin = 16;
    const availW = pageW - margin * 2;
    const availH = pageH - margin * 2;
    const ratio = Math.min(availW / canvas.width, availH / canvas.height);
    const renderW = canvas.width * ratio;
    const renderH = canvas.height * ratio;
    const offsetX = (pageW - renderW) / 2;
    const offsetY = (pageH - renderH) / 2;
    pdf.addImage(imgData, 'JPEG', offsetX, offsetY, renderW, renderH);
    pdf.save(`Planning_SAV_S${weekNum}_${monStr}.pdf`);
    toast(`Export semaine ${weekNum} téléchargé (${collected.length} étiquettes)`, 'success');
  } catch (e) {
    toast('Erreur génération PDF : ' + e.message, 'error');
  }
}

// COMPACT MODE
// ════════════════════════════════════════════════════
function toggleCompact() {
  document.body.classList.toggle('compact');
  requestAnimationFrame(() => { try { renderGantt(); } catch(e){} });
}

// ════════════════════════════════════════════════════
// AJOUT GLOBAL D'UNE ÉTIQUETTE (depuis la toolbar)
// ════════════════════════════════════════════════════
function addLabelGlobal() {
  if (!canEdit()) { toast('Lecture seule', 'warning'); return; }
  closeAllPopups();
  // Modale qui demande : sur quelle personne ?
  const modal = createModal('Nouvelle étiquette — Choisir une personne');
  const body = modal.querySelector('.modal-body');
  const today = dateStr(new Date());
  // Construire la liste : Lignes communes, Équipe SAV, Monteurs en SAV bloqué actuels
  const commune = getLignesCommunes();
  const sav = state.personnes_sav.filter(p => p.actif).sort((a,b) => {
    const o = {chef:0, ts:1};
    return ((o[a.sousgroupe]??99)-(o[b.sousgroupe]??99)) || (a.nom+a.prenom).localeCompare(b.nom+b.prenom);
  });
  const monteurs = getMonteursEnSav(today, today);
  const optionStyle = 'display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;border-radius:6px;border:1px solid var(--border);background:var(--bg-elev-1);transition:.15s';
  const sectionTitle = 'font-size:11px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.08em;margin:14px 0 6px';
  let html = `<div style="display:flex;flex-direction:column;gap:6px">`;
  // Lignes communes
  if (commune.length > 0) {
    html += `<div style="${sectionTitle}">🤝 Lignes communes</div>`;
    commune.forEach(p => {
      html += `<div class="add-pick" data-source="montage" data-id="${p.id}" style="${optionStyle}">
        <span style="font-size:9px;background:var(--bg-elev-3);padding:2px 6px;border-radius:4px;color:var(--text-muted)">COM</span>
        <strong style="flex:1">${p.prenom} ${p.nom}</strong>
        <span style="font-size:11px;color:var(--text-faint)">${p.role||''}</span>
      </div>`;
    });
  }
  // Équipe SAV
  html += `<div style="${sectionTitle}">🛠️ Équipe SAV</div>`;
  sav.forEach(p => {
    html += `<div class="add-pick" data-source="sav" data-id="${p.id}" style="${optionStyle}">
      <span style="font-size:9px;background:var(--bg-elev-3);padding:2px 6px;border-radius:4px;color:var(--text-muted)">${p.sousgroupe==='chef'?'CHEF':'TS'}</span>
      <strong style="flex:1">${p.prenom} ${p.nom}</strong>
      <span style="font-size:11px;color:var(--text-faint)">${p.role||''}</span>
    </div>`;
  });
  // Monteurs en SAV bloqué
  if (monteurs.length > 0) {
    html += `<div style="${sectionTitle}">⚫ Monteurs en SAV bloqué (aujourd'hui)</div>`;
    monteurs.forEach(({person, noirs}) => {
      const noirActifAuj = noirs.find(n => n.dateDebut <= today && n.dateFin >= today) || noirs[0];
      html += `<div class="add-pick" data-source="monteur-zone" data-id="${person.id}" data-noir="${noirActifAuj.id}" style="${optionStyle}">
        <span style="font-size:9px;background:rgba(220,38,38,.2);padding:2px 6px;border-radius:4px;color:#fca5a5">⚫ SAV</span>
        <strong style="flex:1">${person.prenom} ${person.nom}</strong>
        <span style="font-size:11px;color:var(--text-faint)">bloqué</span>
      </div>`;
    });
  }
  html += `</div>`;
  body.innerHTML = html;
  body.querySelectorAll('.add-pick').forEach(el => {
    el.addEventListener('mouseenter', () => el.style.borderColor = 'var(--primary)');
    el.addEventListener('mouseleave', () => el.style.borderColor = 'var(--border)');
    el.addEventListener('click', () => {
      const src = el.dataset.source, id = el.dataset.id, noir = el.dataset.noir;
      closeModal();
      if (src === 'montage') addMontageLabel(id, today);
      else if (src === 'sav') addSavLabel({personneSavId:id, defaultDate:today});
      else if (src === 'monteur-zone') addSavLabel({estMonteurZone:true, monteurId:id, etiquetteNoirId:noir, defaultDate:today});
    });
  });
  modal.querySelector('.modal-footer').innerHTML = '<button class="btn btn-secondary" onclick="closeModal()">Annuler</button>';
  document.body.appendChild(modal);
}

// ════════════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════════════
function toast(msg, type='info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════
async function init() {
  if (!window.supabase) {
    document.getElementById('auth-screen').innerHTML = '<h2>⚠️ Supabase indisponible</h2><p>Vérifiez votre connexion.</p>';
    showAuthScreen();
    return;
  }
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { persistSession: true, autoRefreshToken: true },
    realtime: { params: { eventsPerSecond: 5 } }
  });
  const { data: { session } } = await sb.auth.getSession();
  if (session) await onAuthSuccess(session);
  else showAuthScreen();
  sb.auth.onAuthStateChange((event) => { if (event === 'SIGNED_OUT') showAuthScreen(); });
}
init();
</script>
